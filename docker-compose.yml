version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: revenew-postgres
    environment:
      POSTGRES_USER: revenew_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: revenew_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revenew_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - revenew

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: revenew-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - revenew

