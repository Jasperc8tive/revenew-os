# Nginx reverse proxy configuration for Revenew OS
# Routes traffic to web, API, and agents services

upstream web_backend {
  server localhost:3000;
}

upstream api_backend {
  server localhost:3001;
}

upstream agents_backend {
  server localhost:8000;
}

server {
  listen 80;
  server_name localhost;

  # Routes to Next.js frontend
  location / {
    proxy_pass http://web_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Routes to NestJS API
  location /api/ {
    proxy_pass http://api_backend/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Routes to Python agents service
  location /agents/ {
    proxy_pass http://agents_backend/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
